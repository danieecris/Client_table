version: "3.9"

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_USER: dani_user
      MYSQL_PASSWORD: Dani04096524
      MYSQL_ROOT_PASSWORD: Dani04096524
      MYSQL_DATABASE: crud
  
    ports:
      - "3308:3306"  
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
  api:
    build: .
    container_name: api
    ports:
      - "3003:3003"
    env_file:
      - .env
    depends_on:
      mysql:
        condition: service_healthy    

        